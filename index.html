<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Management Membri</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<h1>Panou de Control CrossFit</h1>

<nav>
    <a href="/">Membri</a> |
    <a href="/antrenori">Antrenori</a> |
    <a href="/abonamente">Abonamente</a> |
    <a href="/produse">Produse</a> |
    <a href="/echipamente">Echipamente</a> |
    <a href="/tipuri-antrenament">Categorii Antrenament</a> |
    <a href="/clase">Clase (Orar)</a> |
    <a href="/inscrieri">Înscrieri</a>
    <a href="/orar">Orar Săptămânal</a>
    <a href="/rapoarte">Rapoarte</a>
</nav>
<h2>Adaugă Membru Nou</h2>
<form id="form-add-membru">
    <div>
        <label for="nume">Nume:</label>
        <input type="text" id="nume" required>
    </div>
    <div>
        <label for="prenume">Prenume:</label>
        <input type="text" id="prenume" required>
    </div>
    <div>
        <label for="email">Email:</label>
        <input type="email" id="email" required>
    </div>
    <div>
        <label for="select-abonament">Abonament:</label>
        <select id="select-abonament" required>
            <option value="">Alege un abonament...</option>
        </select>
    </div>
    <button type="submit">Adaugă Membru</button>
</form>

<h2>Membri Activi</h2>
<table>
    <thead>
    <tr>
        <th>ID Membru</th>
        <th>Nume</th>
        <th>Prenume</th>
        <th>Email</th>
        <th>Acțiuni</th>
    </tr>
    </thead>
    <tbody id="lista-membri">
    <tr><td colspan="4">Se încarcă membrii...</td></tr>
    </tbody>
</table>

<script src="/script.js" defer></script>

</body>
</html>
