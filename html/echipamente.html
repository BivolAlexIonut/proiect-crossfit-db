    <meta charset="UTF-8">

</head>
<body>
<h1>Panou de Control CrossFit</h1>

<nav>

<h2>Adaugă Echipament Nou</h2>
<form id="form-add-echipament">
    <div>
        <label for="nume-echipament">Nume Echipament:</label>
        <input type="text" id="nume-echipament" required>
    </div>
    <div>
        <label for="cantitate-echipament">Cantitate Totală:</label>
        <input type="number" id="cantitate-echipament" step="1" min="0" required>
    </div>
    <button type="submit">Adaugă Echipament</button>
</form>

<h2>Echipamente Existente</h2>
<table>
    <thead>
    <tr>
        <th onclick="sortEchipamente('id')" style="cursor: pointer;">ID Echipament &#x2195;</th>
        <th onclick="sortEchipamente('nume')" style="cursor: pointer;">Nume &#x2195;</th>
        <th onclick="sortEchipamente('cantitate')" style="cursor: pointer;">Cantitate &#x2195;</th>
        <th>Acțiuni</th>
    </tr>
    </thead>
    <tbody id="lista-echipamente">
    <tr><td colspan="4">Se încarcă echipamentele...</td></tr>
    </tbody>
</table>
<script src="/js/echipamente.js" defer></script>
</body>
</html>
