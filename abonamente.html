<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Management Abonamente</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<h1>Panou de Control CrossFit</h1>

<nav>
    <a href="/">Membri</a> |
    <a href="/antrenori">Antrenori</a> |
    <a href="/abonamente">Abonamente</a> |
    <a href="/produse">Produse</a> |
    <a href="/echipamente">Echipamente</a> |
    <a href="/tipuri-antrenament">Categorii Antrenament</a> |
    <a href="/clase">Clase (Orar)</a> |
    <a href="/inscrieri">Înscrieri</a>
    <a href="/orar">Orar Săptămânal</a>
    <a href="/rapoarte">Rapoarte</a>
</nav>

<h2>Adaugă Abonament Nou</h2>
<form id="form-add-abonament">
    <div>
        <label for="tip-abonament">Tip Abonament:</label>
        <input type="text" id="tip-abonament" required>
    </div>
    <div>
        <label for="pret-abonament">Preț (RON):</label>
        <input type="number" id="pret-abonament" step="0.01" required>
    </div>
    <button type="submit">Adaugă Abonament</button>
</form>

<h2>Abonamente Existente</h2>
<table>
    <thead>
    <tr>
        <th>ID Abonament</th>
        <th>Tip Abonament</th>
        <th>Preț</th>
        <th>Acțiuni</th>
    </tr>
    </thead>
    <tbody id="lista-abonamente">
    <tr><td colspan="4">Se încarcă abonamentele...</td></tr>
    </tbody>
</table>

<script src="/abonamente.js" defer></script>

</body>
</html>
