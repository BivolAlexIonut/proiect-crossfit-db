<nav>

<h2>Adaugă Produs Nou</h2>
<form id="form-add-produs">
    <div>
        <label for="nume-produs">Nume Produs:</label>
        <input type="text" id="nume-produs" required>
    </div>
    <div>
        <label for="pret-produs">Preț:</label>
        <input type="number" id="pret-produs" step="0.01" required>
    </div>
    <div>
        <label for="stoc-produs">Stoc:</label>
        <input type="number" id="stoc-produs" step="1" required>
    </div>
    <button type="submit">Adaugă Produs</button>
</form>

<h2>Produse în Stoc</h2>
<table>
    <thead>
    <tr>
        <th>ID Produs</th>
        <th>Nume</th>
        <th>Preț</th>
        <th>Stoc</th>
        <th>Acțiuni</th>
    </tr>
    </thead>
    <tbody id="lista-produse">
    <tr><td colspan="5">Se încarcă produsele...</td></tr>
    </tbody>
</table>
<script src="/produse.js" defer></script>
</body>
</html>
